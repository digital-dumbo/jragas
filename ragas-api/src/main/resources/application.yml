spring:
  application:
    name: ragas-api

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [traceId:%X{traceId}] %logger{36} - %msg%n"
