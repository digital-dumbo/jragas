<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1829"/>
    </linearGradient>

    <!-- Java orange accent gradient -->
    <linearGradient id="javaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f89820"/>
      <stop offset="100%" style="stop-color:#e05a00"/>
    </linearGradient>

    <!-- Teal evaluation line gradient -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c9b1"/>
      <stop offset="100%" style="stop-color:#00a8e8"/>
    </linearGradient>

    <!-- Glow filter for text -->
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2744" stroke-width="0.5"/>
    </pattern>

    <!-- Clip path for bars -->
    <clipPath id="barClip">
      <rect x="0" y="0" width="800" height="500"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <rect width="800" height="500" fill="url(#grid)" opacity="0.4"/>

  <!-- Subtle corner decorations -->
  <rect x="0" y="0" width="120" height="2" fill="url(#javaGrad)" opacity="0.7"/>
  <rect x="0" y="0" width="2" height="120" fill="url(#javaGrad)" opacity="0.7"/>
  <rect x="680" y="498" width="120" height="2" fill="url(#tealGrad)" opacity="0.7"/>
  <rect x="798" y="380" width="2" height="120" fill="url(#tealGrad)" opacity="0.7"/>

  <!-- Background radial glow - Java orange -->
  <ellipse cx="230" cy="230" rx="200" ry="180" fill="#f89820" opacity="0.04"/>
  <!-- Background radial glow - teal -->
  <ellipse cx="570" cy="270" rx="180" ry="160" fill="#00c9b1" opacity="0.05"/>

  <!-- === EVALUATION BARS (stylized metric bars suggesting LLM evaluation) === -->
  <!-- Bar group, right side, subtle -->
  <g opacity="0.18" transform="translate(560, 100)">
    <rect x="0"   y="100" width="18" height="180" rx="3" fill="#00c9b1"/>
    <rect x="26"  y="60"  width="18" height="220" rx="3" fill="#00a8e8"/>
    <rect x="52"  y="130" width="18" height="150" rx="3" fill="#00c9b1"/>
    <rect x="78"  y="40"  width="18" height="240" rx="3" fill="#f89820"/>
    <rect x="104" y="80"  width="18" height="200" rx="3" fill="#00a8e8"/>
    <rect x="130" y="110" width="18" height="170" rx="3" fill="#00c9b1"/>
    <rect x="156" y="50"  width="18" height="230" rx="3" fill="#f89820"/>
  </g>

  <!-- === JAVA COFFEE CUP ICON (simplified geometric) === -->
  <g transform="translate(68, 140)">
    <!-- Cup body -->
    <path d="M20 20 L10 90 Q10 110 32 110 L68 110 Q90 110 90 90 L80 20 Z" 
          fill="none" stroke="url(#javaGrad)" stroke-width="3" opacity="0.85"/>
    <!-- Cup handle -->
    <path d="M80 40 Q110 40 110 65 Q110 90 80 80" 
          fill="none" stroke="url(#javaGrad)" stroke-width="3" opacity="0.85"/>
    <!-- Steam lines -->
    <path d="M35 8 Q40 0 35 -8" fill="none" stroke="#f89820" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M50 5 Q55 -5 50 -15" fill="none" stroke="#f89820" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M65 8 Q70 0 65 -8" fill="none" stroke="#f89820" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Saucer -->
    <ellipse cx="50" cy="115" rx="55" ry="8" fill="none" stroke="url(#javaGrad)" stroke-width="2.5" opacity="0.7"/>
    <!-- J letter in cup -->
    <text x="50" y="80" font-family="Georgia, serif" font-size="36" font-weight="bold" 
          fill="url(#javaGrad)" text-anchor="middle" opacity="0.9" filter="url(#glowOrange)">J</text>
  </g>

  <!-- === MAIN WORDMARK === -->
  <!-- "JRagas" primary title -->
  <text x="195" y="220" font-family="'Courier New', Courier, monospace" font-size="92" font-weight="bold" 
        fill="url(#javaGrad)" opacity="0.95" filter="url(#glowOrange)" letter-spacing="-2">
    JRagas
  </text>

  <!-- Underline accent -->
  <rect x="195" y="232" width="470" height="3" rx="1.5" fill="url(#tealGrad)" opacity="0.8"/>

  <!-- === SUBTITLE === -->
  <text x="197" y="275" font-family="'Courier New', Courier, monospace" font-size="17" 
        fill="#00c9b1" opacity="0.9" letter-spacing="4">
    LLM EVALUATION FRAMEWORK FOR JAVA
  </text>

  <!-- === TAG LINE === -->
  <text x="197" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="14" 
        fill="#7a9bbf" opacity="0.75" font-style="italic" letter-spacing="1">
    Parallel to Ragas · Open Source · Production-Ready
  </text>

  <!-- === FEATURE PILLS === -->
  <!-- Faithfulness -->
  <g transform="translate(195, 340)">
    <rect width="130" height="32" rx="16" fill="#0f2040" stroke="#00c9b1" stroke-width="1.2" opacity="0.9"/>
    <text x="65" y="21" font-family="'Courier New', monospace" font-size="12" fill="#00c9b1" 
          text-anchor="middle" letter-spacing="1">Faithfulness</text>
  </g>
  <!-- Answer Relevance -->
  <g transform="translate(338, 340)">
    <rect width="158" height="32" rx="16" fill="#0f2040" stroke="#f89820" stroke-width="1.2" opacity="0.9"/>
    <text x="79" y="21" font-family="'Courier New', monospace" font-size="12" fill="#f89820" 
          text-anchor="middle" letter-spacing="1">Answer Relevance</text>
  </g>
  <!-- Context Precision -->
  <g transform="translate(509, 340)">
    <rect width="155" height="32" rx="16" fill="#0f2040" stroke="#00a8e8" stroke-width="1.2" opacity="0.9"/>
    <text x="77" y="21" font-family="'Courier New', monospace" font-size="12" fill="#00a8e8" 
          text-anchor="middle" letter-spacing="1">Context Precision</text>
  </g>

  <!-- === BOTTOM META === -->
  <!-- Horizontal separator -->
  <rect x="60" y="408" width="680" height="1" fill="#1e3055" opacity="0.8"/>

  <!-- Open Source badge -->
  <g transform="translate(195, 425)">
    <rect width="110" height="28" rx="6" fill="#0a1628" stroke="#f89820" stroke-width="1" opacity="0.8"/>
    <text x="55" y="19" font-family="'Courier New', monospace" font-size="11" fill="#f89820" 
          text-anchor="middle" letter-spacing="2">OPEN SOURCE</text>
  </g>

  <!-- Maven / Java badge -->
  <g transform="translate(318, 425)">
    <rect width="90" height="28" rx="6" fill="#0a1628" stroke="#00c9b1" stroke-width="1" opacity="0.8"/>
    <text x="45" y="19" font-family="'Courier New', monospace" font-size="11" fill="#00c9b1" 
          text-anchor="middle" letter-spacing="2">JAVA 11+</text>
  </g>

  <!-- Maven badge -->
  <g transform="translate(421, 425)">
    <rect width="90" height="28" rx="6" fill="#0a1628" stroke="#00a8e8" stroke-width="1" opacity="0.8"/>
    <text x="45" y="19" font-family="'Courier New', monospace" font-size="11" fill="#00a8e8" 
          text-anchor="middle" letter-spacing="2">MAVEN</text>
  </g>

  <!-- Version tag -->
  <text x="665" y="443" font-family="'Courier New', monospace" font-size="12" 
        fill="#3a5070" text-anchor="end" letter-spacing="1">v1.0.0-alpha</text>

  <!-- === DECORATIVE CIRCUIT-LIKE LINES === -->
  <g opacity="0.15" stroke="#00c9b1" stroke-width="1" fill="none">
    <polyline points="60,460 80,460 80,480 720,480 720,460 740,460"/>
    <circle cx="80" cy="460" r="3" fill="#00c9b1"/>
    <circle cx="720" cy="460" r="3" fill="#00c9b1"/>
  </g>

  <!-- Small dots decoration -->
  <g fill="#f89820" opacity="0.4">
    <circle cx="62" cy="230" r="3"/>
    <circle cx="62" cy="245" r="3"/>
    <circle cx="62" cy="260" r="3"/>
  </g>
  <g fill="#00c9b1" opacity="0.4">
    <circle cx="738" cy="230" r="3"/>
    <circle cx="738" cy="245" r="3"/>
    <circle cx="738" cy="260" r="3"/>
  </g>
</svg>
